services:
  postgres:
    image: postgres:17-alpine
    container_name: sns-automation-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sns_automation}
      POSTGRES_USER: ${POSTGRES_USER:-sns}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sns100!}
      TZ: Asia/Seoul
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sns} -d ${POSTGRES_DB:-sns_automation}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
